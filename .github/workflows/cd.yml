name: CD

# Esteira de entrega com promoção por ambiente:
#   feature/*  -> STG          (deploy automático)
#   release/*  -> PRÉ-PRODUÇÃO (deploy automático)
#   main / v*  -> PRODUÇÃO     (deploy com aprovação manual via GitHub Environment)
on:
  push:
    branches: [main, 'feature/**', 'release/**']
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Estágio 2: Build + Push da imagem Docker para o GHCR ───
  build-publish:
    name: Docker build & push (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Calcular nome e tags da imagem
        id: meta
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          TAGS="${IMAGE}:${GITHUB_SHA}
          ${IMAGE}:${SAFE_REF}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS}
          ${IMAGE}:latest"
          fi
          {
            echo "image=${IMAGE}"
            echo "image_ref=${IMAGE}:${GITHUB_SHA}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Estágio 3a: Deploy em STG (branches feature/*) ───
  deploy-stg:
    name: Deploy STG
    needs: build-publish
    if: startsWith(github.ref, 'refs/heads/feature/')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      namespace: oficina-stg
      image_ref: ${{ needs.build-publish.outputs.image_ref }}
    secrets: inherit

  # ─── Estágio 3b: Deploy em PRÉ-PRODUÇÃO (branches release/*) ───
  deploy-preprod:
    name: Deploy PRÉ-PRODUÇÃO
    needs: build-publish
    if: startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: pre-prod
      namespace: oficina-homolog
      image_ref: ${{ needs.build-publish.outputs.image_ref }}
    secrets: inherit

  # ─── Estágio 3c: Deploy em PRODUÇÃO (main / tag v*) — com aprovação manual ───
  deploy-prod:
    name: Deploy PRODUÇÃO
    needs: build-publish
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      namespace: oficina-prod
      image_ref: ${{ needs.build-publish.outputs.image_ref }}
    secrets: inherit
