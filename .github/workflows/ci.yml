# Implementação de teste na esteira CI em 24/06/2026.
name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build + tests + JaCoCo
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: warn

  sbom:
    name: SBOM (CycloneDX) + Dependency-Track
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Generate CycloneDX SBOM
        run: ./mvnw -B -DskipTests package cyclonedx:makeAggregateBom

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            target/bom.xml
            target/bom.json
          if-no-files-found: error

      - name: Upload SBOM to Dependency-Track
        if: ${{ env.DTRACK_URL != '' && env.DTRACK_API_KEY != '' }}
        env:
          DTRACK_URL: ${{ secrets.DEPENDENCY_TRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          DTRACK_PROJECT_NAME: ${{ vars.DEPENDENCY_TRACK_PROJECT_NAME || 'oficina-backend' }}
          DTRACK_PROJECT_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Uploading SBOM to Dependency-Track at $DTRACK_URL"
          curl -fsS -X POST "$DTRACK_URL/api/v1/bom" \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -H "Content-Type: multipart/form-data" \
            -F "autoCreate=true" \
            -F "projectName=$DTRACK_PROJECT_NAME" \
            -F "projectVersion=$DTRACK_PROJECT_VERSION" \
            -F "bom=@target/bom.xml"
          echo "SBOM uploaded. Dependency-Track will process it asynchronously."

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy SARIF as artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          if-no-files-found: warn
