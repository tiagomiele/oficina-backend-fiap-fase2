services:
  db:
    image: postgres:16-alpine
    container_name: oficina-db
    environment:
      POSTGRES_DB: oficina
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
    ports:
      - "5432:5432"
    volumes:
      - oficina-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina -d oficina"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oficina-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/oficina
      DB_USER: oficina
      DB_PASSWORD: oficina
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars-long-please}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@oficina.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_TLS: ${SMTP_TLS:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    ports:
      - "8080:8080"

  adminer:
    image: adminer:4
    container_name: oficina-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  oficina-db-data:
